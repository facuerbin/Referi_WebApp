<div class="position-relative">
  <input
    [type]="visible ? 'text' : 'password'"
    class="form-control"
    [placeholder]="placeholder"
    [value]="value"
    (input)="onInput($event)"
    (blur)="onTouched()"
  />
  <button class="form-icon-right" (click)="toggle($event)" type="button">
    <fa-icon [icon]="visible ? eyeSlash : eye" aria-hidden="true"></fa-icon>
  </button>
</div>
